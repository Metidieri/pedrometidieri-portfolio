<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título base -->
    <title>Pedro Metidieri | Full Stack Developer</title>
    <meta name="description" content="Pedro Metidieri — Full Stack Developer especializado en React, Next.js, Flask y Tailwind CSS. Desarrollador web freelance y fundador de MTDR Servicios Digitales en Extremadura, España." />
    <link rel="canonical" href="https://www.pedrometidieri.com" />

    <!-- Fuentes Google: preconnect + preload para evitar FOIT.
         Inter (variable font) cubre 400/500/700 en un único woff2.
         Plus Jakarta Sans solo necesita 700 para headings. display=swap evita bloquear render. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/plusjakartasans/v12/LDIbaomQNQcsA88c7O9yZ4KMCoOg4IA6-91aHEjcWuA_Tkn9TR_V.woff2" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet" crossorigin />

    <!-- Favicon y Apple Touch Icon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Open Graph / Facebook, LinkedIn, WhatsApp -->
    <meta property="og:title" content="Pedro Metidieri | Full Stack Developer" />
    <meta property="og:description" content="Desarrollador Full Stack especializado en React, Flask y Tailwind CSS. Proyectos reales, clientes reales." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.pedrometidieri.com" />
    <meta property="og:image" content="https://www.pedrometidieri.com/og-image.png" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pedro Metidieri | Full Stack Developer" />
    <meta name="twitter:description" content="Desarrollador Full Stack especializado en React, Flask y Tailwind CSS. Proyectos reales, clientes reales." />
    <meta name="twitter:image" content="https://www.pedrometidieri.com/og-image.png" />

  </head>
  <body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
