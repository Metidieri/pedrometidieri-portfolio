<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título base -->
    <title>Pedro Metidieri | Full Stack Developer</title>
    <meta name="description" content="Desarrollador Full Stack especializado en React, Node.js, Next.js y soluciones escalables. Proyectos web y apps a medida." />

    <!-- Fuentes Google: preconnect + preload para evitar FOIT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />

    <!-- Favicon y Apple Touch Icon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- Open Graph / Facebook, LinkedIn, WhatsApp -->
    <meta property="og:title" content="Pedro Metidieri | Full Stack Developer" />
    <meta property="og:description" content="Crea aplicaciones web y móviles rápidas y escalables. Especializado en React, Node.js, Next.js, IA y cloud." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://pedrometidieri.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pedro Metidieri | Full Stack Developer" />
    <meta name="twitter:description" content="Crea aplicaciones web y móviles rápidas y escalables." />
    <meta name="twitter:image" content="/og-image.jpg" />

  </head>
  <body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
